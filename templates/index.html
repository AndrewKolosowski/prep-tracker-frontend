<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prep Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">

  <div class="container">
    <h1 class="mb-4">Add Weight Entry</h1>

    <form id="entryForm">
      <div class="mb-3">
        <label for="date" class="form-label">Date</label>
        <input type="date" class="form-control" id="date" required>
      </div>

      <div class="mb-3">
        <label for="weight" class="form-label">Weight (lbs)</label>
        <input type="number" step="0.1" class="form-control" id="weight" required>
      </div>

      <button type="submit" class="btn btn-primary">Add Entry</button>
    </form>

    <div id="result" class="mt-3"></div>
  </div>

  <script>
    const API_PROXY_URL = "/add_entry_proxy";

    document.getElementById("entryForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const date = document.getElementById("date").value;
      const weight = parseFloat(document.getElementById("weight").value);

      const resultDiv = document.getElementById("result");

      try {
        const response = await fetch(API_PROXY_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ date, weight })
        });

        const data = await response.json();

        if (response.ok) {
          resultDiv.innerHTML = `<div class="alert alert-success">${data.message}</div>`;
        } else {
          resultDiv.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
        }
      } catch (err) {
        resultDiv.innerHTML = `<div class="alert alert-danger">Request failed</div>`;
      }
    });
  </script>

</body>
</html>
