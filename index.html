<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prep Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="container py-4">

  <h1>Prep Tracker</h1>

  <!-- Google Login Button -->
  <div id="g_id_onload"
       data-client_id="YOUR_GOOGLE_CLIENT_ID"
       data-callback="handleCredentialResponse">
  </div>
  <div class="g_id_signin" data-type="standard"></div>

  <!-- Add Weight Form -->
  <div class="mt-4">
    <input type="number" id="weightInput" placeholder="Weight (lbs)" class="form-control w-25 d-inline-block">
    <button class="btn btn-primary" onclick="addWeight()">Add Weight</button>
  </div>

  <!-- Chart -->
  <canvas id="weightChart" class="mt-4" height="100"></canvas>

  <script src="script.js"></script>
</body>
</html>
